# ─────────────────────────────────────────────────────────────
#   Contribution Snake Generator · @Harsh-204
#   Place this file at: .github/workflows/snake.yml
#   in your Harsh-204/Harsh-204 profile repository
# ─────────────────────────────────────────────────────────────

name: 🐍 Generate Contribution Snake

on:
  # Auto-run every day at midnight UTC
  schedule:
    - cron: "0 0 * * *"

  # Run whenever you push to main
  push:
    branches:
      - main

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  generate:
    name: Generate Snake SVG
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Generate contribution snake (light + dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Harsh-204

          # Light mode snake — yellow on white grid
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=FF006E&color_dots=#FFE500,#FF9900,#FF006E,#000000
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=FFE500&color_dots=#333333,#FF9900,#FF006E,#FFE500

      - name: 🚀 Push output to `output` branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
